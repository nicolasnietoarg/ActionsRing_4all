<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 700px; height: 700px; overflow: hidden; background: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; }

    .ring-container {
      width: 700px; height: 700px;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-app-region: no-drag;
    }

    .ring-wrapper {
      position: relative; width: 700px; height: 700px;
      animation: fadeIn 0.2s ease-out;
    }

    .ring-glow { display: none; }

    /* Center button */
    .center-btn {
      position: absolute;
      left: calc(50% - 40px); top: calc(50% - 40px);
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: none;
      box-shadow: 0 8px 32px rgba(15,23,42,0.3), 0 2px 8px rgba(15,23,42,0.2);
      color: #38bdf8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .center-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(15,23,42,0.35), 0 4px 12px rgba(56,189,248,0.15);
    }
    .center-btn:active { transform: scale(0.92); }
    .center-icon { font-size: 22px; }
    .center-label { font-size: 9px; color: rgba(255,255,255,0.6); margin-top: 2px; font-weight: 500; letter-spacing: 0.3px; }

    /* Bubble buttons */
    .bubble {
      position: absolute;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: none;
      box-shadow: 0 4px 16px rgba(15,23,42,0.25), 0 1px 4px rgba(15,23,42,0.15);
      color: #38bdf8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bubble:hover, .bubble-hover {
      transform: scale(1.15);
      box-shadow: 0 8px 24px rgba(15,23,42,0.3), 0 0 12px rgba(56,189,248,0.2);
    }
    .bubble:active { transform: scale(0.88); }
    .bubble-icon { font-size: 20px; line-height: 1; }
    .bubble-label {
      position: absolute;
      bottom: -22px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 700; color: #334155;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.92);
      padding: 3px 8px; border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(226,232,240,0.8);
    }

    /* Sub bubbles (Rol profiles) */
    .sub-bubble {
      width: 48px !important; height: 48px !important;
      background: linear-gradient(145deg, #334155, #1e293b) !important;
      box-shadow: 0 3px 12px rgba(15,23,42,0.2) !important;
      z-index: 10;
    }
    .sub-bubble .bubble-icon { font-size: 17px; }
    .sub-bubble .bubble-label { font-size: 8px; bottom: -18px; }

    /* Action sub-bubbles */
    .action-sub-bubble {
      width: 44px !important; height: 44px !important;
      background: linear-gradient(145deg, #475569, #334155) !important;
      box-shadow: 0 2px 8px rgba(15,23,42,0.18) !important;
      z-index: 5;
    }
    .action-sub-bubble .bubble-icon { font-size: 15px; }
    .action-sub-bubble .bubble-label { font-size: 7px; bottom: -16px; }

    .bubble { z-index: 20; }

    .rol-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .rol-container > * { pointer-events: auto; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes bubblePop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../../dist/renderer.js"></script>
</body>
</html>
