<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 700px; height: 700px; overflow: hidden; background: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; }

    .ring-container {
      width: 700px; height: 700px;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-app-region: no-drag;
    }

    .ring-wrapper {
      position: relative; width: 700px; height: 700px;
      animation: fadeIn 0.2s ease-out;
    }

    .ring-glow { display: none; }

    /* Center button */
    .center-btn {
      position: absolute;
      left: calc(50% - 50px); top: calc(50% - 50px);
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: none;
      box-shadow: 0 8px 32px rgba(15,23,42,0.3), 0 2px 8px rgba(15,23,42,0.2);
      color: #38bdf8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .center-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(15,23,42,0.35), 0 4px 12px rgba(56,189,248,0.15);
    }
    .center-btn:active { transform: scale(0.92); }
    .center-icon { font-size: 22px; }
    .center-label { font-size: 9px; color: rgba(255,255,255,0.6); margin-top: 2px; font-weight: 500; letter-spacing: 0.3px; }

    /* Bubble buttons */
    .bubble {
      position: absolute;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: none;
      box-shadow: 0 4px 16px rgba(15,23,42,0.25), 0 1px 4px rgba(15,23,42,0.15);
      color: #38bdf8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease, border-color 0.3s;
    }
    .bubble:hover, .bubble-hover {
      transform: scale(1.2) !important;
      box-shadow: 0 8px 28px rgba(15,23,42,0.35), 0 0 20px rgba(56,189,248,0.3) !important;
      border: 1px solid rgba(56,189,248,0.3);
    }
    .bubble:active { transform: scale(0.85) !important; transition-duration: 0.1s; }
    .bubble-icon { font-size: 20px; line-height: 1; }
    .bubble-label {
      position: absolute;
      bottom: -20px; left: 50%; transform: translateX(-50%);
      font-size: 8px; font-weight: 700; color: #334155;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.92);
      padding: 2px 5px; border-radius: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(226,232,240,0.8);
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Sub bubbles (Rol profiles) */
    .sub-bubble {
      width: 48px !important; height: 48px !important;
      background: linear-gradient(145deg, #334155, #1e293b) !important;
      box-shadow: 0 3px 12px rgba(15,23,42,0.2) !important;
      z-index: 10;
    }
    .sub-bubble .bubble-icon { font-size: 17px; }
    .sub-bubble .bubble-label { font-size: 8px; bottom: -18px; }

    /* Action sub-bubbles */
    .action-sub-bubble {
      width: 44px !important; height: 44px !important;
      background: linear-gradient(145deg, #475569, #334155) !important;
      box-shadow: 0 2px 8px rgba(15,23,42,0.18) !important;
      z-index: 5;
    }
    .action-sub-bubble .bubble-icon { font-size: 15px; }
    .action-sub-bubble .bubble-label { font-size: 7px; bottom: -16px; }

    .bubble { z-index: 20; }

    /* Pinned actions indicator */
    .bubble-pinned {
      border: 1.5px solid rgba(56,189,248,0.5);
    }
    .bubble-pinned:not([style*="deckOut"]):not([style*="popOut"]):not([style*="fadeOut"]) {
      animation: pinPulse 2.5s ease-in-out 1.5s infinite !important;
    }
    .pin-dot {
      position: absolute; top: 3px; right: 3px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 4px rgba(56,189,248,0.6);
    }

    /* Macro bubble accent */
    .bubble-macro {
      border: 1.5px solid rgba(168,85,247,0.4);
      color: #a855f7;
    }
    .bubble-macro:hover { box-shadow: 0 8px 28px rgba(15,23,42,0.35), 0 0 20px rgba(168,85,247,0.3) !important; }

    .rol-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .rol-container > * { pointer-events: auto; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes bubblePop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.18); opacity: 1; }
      75% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }
    @keyframes popOut {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    /* Deck: bubbles start stacked at center, fly out to their position */
    @keyframes deckIn {
      0% {
        transform: translate(calc(350px - 100%), calc(350px - 100%)) scale(0.3) rotate(-15deg);
        opacity: 0;
      }
      30% { opacity: 1; }
      100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
    }
    /* Deck exit: bubbles fly back to center stacking */
    @keyframes deckOut {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      70% { opacity: 1; }
      100% {
        transform: translate(calc(350px - 100%), calc(350px - 100%)) scale(0.3) rotate(15deg);
        opacity: 0;
      }
    }
    @keyframes pinPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(15,23,42,0.25), 0 0 0 0 rgba(56,189,248,0.4); }
      50% { box-shadow: 0 4px 16px rgba(15,23,42,0.25), 0 0 0 8px rgba(56,189,248,0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../../dist/renderer.js"></script>
</body>
</html>
