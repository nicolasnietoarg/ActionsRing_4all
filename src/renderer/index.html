<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 700px; height: 700px; overflow: hidden; background: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; }

    .ring-container {
      width: 700px; height: 700px;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-app-region: no-drag;
    }

    .ring-wrapper {
      position: relative; width: 700px; height: 700px;
    }

    /* Center button — Kugo teal */
    .center-btn {
      position: absolute;
      left: calc(50% - 50px); top: calc(50% - 50px);
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a2332, #0f1923);
      border: 1.5px solid rgba(38,186,142,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(38,186,142,0.1);
      color: #26ba8e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .center-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(38,186,142,0.2);
      border-color: rgba(38,186,142,0.5);
    }
    .center-btn:active { transform: scale(0.92); }
    .center-icon { font-size: 22px; }
    .center-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 500; letter-spacing: 0.3px; }

    /* Bubble buttons — Kugo dark + teal */
    .bubble {
      position: absolute;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a2332, #0f1923);
      border: 1px solid rgba(38,186,142,0.15);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 8px rgba(38,186,142,0.05);
      color: #26ba8e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s, border-color 0.2s;
    }

    /* Hover glow — Kugo teal */
    .bubble:hover, .bubble-hover {
      transform: scale(1.2) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 24px rgba(38,186,142,0.3) !important;
      border-color: rgba(38,186,142,0.5) !important;
    }
    .bubble:active { transform: scale(0.85) !important; transition-duration: 0.1s; }

    .bubble-icon { font-size: 20px; line-height: 1; }
    .bubble-label {
      position: absolute;
      bottom: -22px; left: 50%; transform: translateX(-50%);
      font-size: 8px; font-weight: 600; color: #e2e8f0;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(15,25,35,0.92);
      padding: 3px 8px; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(38,186,142,0.15);
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Pinned indicator — Kugo teal */
    .bubble-pinned {
      border: 1.5px solid rgba(38,186,142,0.5);
    }
    .bubble-pinned:not([style*="Out"]) {
      animation: pinPulse 2.5s ease-in-out 1.5s infinite !important;
    }
    .pin-dot {
      position: absolute;
      top: 3px; right: 3px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #26ba8e;
      box-shadow: 0 0 6px rgba(38,186,142,0.7);
    }

    /* Macro bubble — purple accent */
    .bubble-macro {
      border: 1.5px solid rgba(168,85,247,0.4);
      color: #a855f7;
    }
    .bubble-macro:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 20px rgba(168,85,247,0.3) !important;
      border-color: rgba(168,85,247,0.5) !important;
    }

    /* Sub bubbles */
    .sub-bubble {
      width: 48px !important; height: 48px !important;
      background: linear-gradient(145deg, #1e2d3d, #152231) !important;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3) !important;
      z-index: 10;
    }
    .sub-bubble .bubble-icon { font-size: 17px; }
    .sub-bubble .bubble-label { font-size: 7px; bottom: -18px; }

    /* Action sub-bubbles */
    .action-sub-bubble {
      width: 44px !important; height: 44px !important;
      background: linear-gradient(145deg, #243447, #1a2836) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25) !important;
      z-index: 5;
    }
    .action-sub-bubble .bubble-icon { font-size: 15px; }
    .action-sub-bubble .bubble-label { font-size: 7px; bottom: -16px; }

    .bubble { z-index: 20; }

    /* Keyframes */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes bubblePop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.18); opacity: 1; }
      75% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }
    @keyframes popOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
    @keyframes deckIn {
      0% { transform: translate(calc(350px - 100%), calc(350px - 100%)) scale(0.3) rotate(-15deg); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes deckOut {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      70% { opacity: 1; }
      100% { transform: translate(calc(350px - 100%), calc(350px - 100%)) scale(0.3) rotate(15deg); opacity: 0; }
    }
    @keyframes pinPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 0 rgba(38,186,142,0.4); }
      50% { box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 8px rgba(38,186,142,0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../../dist/renderer.js"></script>
</body>
</html>
