<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Actions Ring - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #f5f5f7;
      -webkit-app-region: drag;
    }
    body * { -webkit-app-region: no-drag; }
    .loading { padding: 60px; text-align: center; color: #86868b; }

    .app { display: flex; height: 100%; padding-top: 38px; }

    /* Sidebar */
    .sidebar {
      width: 200px; min-width: 200px;
      background: rgba(246,246,246,0.8);
      border-right: 1px solid #d2d2d7;
      padding: 12px 8px;
      display: flex; flex-direction: column; gap: 2px;
      overflow-y: auto;
      -webkit-app-region: drag;
    }
    .sidebar * { -webkit-app-region: no-drag; }
    .sidebar-title { font-size: 11px; font-weight: 600; color: #86868b; padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .sidebar-item {
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; color: #1d1d1f;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .sidebar-item:hover { background: rgba(0,0,0,0.04); }
    .sidebar-item.active { background: #007aff; color: #fff; }
    .sidebar-item .icon { font-size: 16px; }
    .sidebar-add {
      margin-top: 4px; padding: 6px 10px; border-radius: 6px;
      cursor: pointer; font-size: 12px; color: #007aff;
      border: none; background: none; text-align: left;
      display: flex; align-items: center; gap: 6px;
    }
    .sidebar-add:hover { background: rgba(0,122,255,0.06); }

    .add-profile-dropdown { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
    .dropdown-hint { font-size: 11px; color: #86868b; }
    .dropdown-select {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 6px;
      padding: 6px 8px; font-size: 12px; color: #1d1d1f; outline: none; width: 100%;
    }
    .dropdown-select:focus { border-color: #007aff; }
    .dropdown-cancel { background: none; border: none; color: #86868b; font-size: 11px; cursor: pointer; padding: 2px 0; text-align: left; }
    .dropdown-cancel:hover { color: #1d1d1f; }

    /* Main content */
    .main {
      flex: 1; padding: 24px 28px; overflow-y: auto;
    }
    .main h2 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }

    /* Hotkey section */
    .section { margin-bottom: 24px; }
    .section-label { font-size: 12px; font-weight: 500; color: #86868b; margin-bottom: 6px; }
    .input-field {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 6px;
      padding: 7px 10px; font-size: 13px; color: #1d1d1f; width: 260px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }

    /* Actions table */
    .actions-table {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 8px;
      overflow: hidden;
    }
    .action-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer; transition: background 0.1s;
    }
    .action-row:last-child { border-bottom: none; }
    .action-row:hover { background: #f5f5f7; }
    .action-row.selected { background: #e8f0fe; }
    .action-row .row-icon { font-size: 20px; width: 28px; text-align: center; }
    .action-row .drag-handle { cursor: grab; opacity: 0.3; font-size: 14px; user-select: none; }
    .action-row .drag-handle:active { cursor: grabbing; }
    .action-row:hover .drag-handle { opacity: 0.6; }
    .action-row .row-label { flex: 1; font-weight: 500; }
    .action-row .row-type { font-size: 11px; color: #86868b; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    .action-row .row-value { font-size: 11px; color: #86868b; font-family: 'SF Mono', monospace; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Edit form */
    .edit-panel {
      margin-top: 16px; background: #fff; border: 1px solid #d2d2d7; border-radius: 8px;
      padding: 16px;
    }
    .edit-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 11px; font-weight: 500; color: #86868b; }
    .form-field input, .form-field select {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 6px;
      padding: 7px 10px; font-size: 13px; color: #1d1d1f; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-field input:focus, .form-field select:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid #d2d2d7; background: #fff; color: #1d1d1f;
      transition: all 0.15s;
    }
    .btn:hover { background: #f5f5f7; }
    .btn-primary { background: #007aff; color: #fff; border-color: #007aff; }
    .btn-primary:hover { background: #0066d6; }
    .btn-danger { color: #ff3b30; border-color: #ff3b30; }
    .btn-danger:hover { background: #fff0f0; }

    .delete-profile { margin-top: 8px; }

    /* Rol config */
    .rol-config { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .rol-tag {
      background: #e8f0fe; color: #1a73e8; border-radius: 14px; padding: 4px 10px;
      font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px;
    }
    .rol-tag-remove { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
    .rol-tag-remove:hover { color: #d93025; }
    .rol-add-select {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 6px;
      padding: 4px 8px; font-size: 12px; color: #007aff; cursor: pointer; outline: none;
    }

    /* Key recorder */
    .key-recorder {
      background: #fff; border: 1px solid #d2d2d7; border-radius: 6px;
      padding: 7px 10px; font-size: 13px; color: #1d1d1f;
      cursor: pointer; width: 100%; text-align: left;
      font-family: 'SF Mono', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .key-recorder:hover { border-color: #86868b; }
    .key-recorder.recording {
      border-color: #ff3b30; color: #ff3b30;
      box-shadow: 0 0 0 3px rgba(255,59,48,0.15);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

    @media (prefers-color-scheme: dark) {
      body { background: #1d1d1f; color: #f5f5f7; }
      .sidebar { background: rgba(30,30,30,0.8); border-color: #333; }
      .sidebar-item { color: #f5f5f7; }
      .sidebar-item:hover { background: rgba(255,255,255,0.06); }
      .sidebar-item.active { background: #0a84ff; }
      .input-field, .form-field input, .form-field select, .key-recorder, .dropdown-select { background: #2c2c2e; border-color: #3a3a3c; color: #f5f5f7; }
      .actions-table, .edit-panel { background: #2c2c2e; border-color: #3a3a3c; }
      .action-row { border-color: #3a3a3c; }
      .action-row:hover { background: #3a3a3c; }
      .action-row.selected { background: #1c3a5e; }
      .section-label, .form-field label { color: #98989d; }
      .action-row .row-type { background: #3a3a3c; color: #98989d; }
      .action-row .row-value { color: #98989d; }
      .btn { background: #2c2c2e; border-color: #3a3a3c; color: #f5f5f7; }
      .btn:hover { background: #3a3a3c; }
      .rol-tag { background: #1c3a5e; color: #64d2ff; }
      .hotkey-box input:focus, .form-field input:focus, .form-field select:focus { border-color: #0a84ff; box-shadow: 0 0 0 3px rgba(10,132,255,0.2); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../../dist/settings.js"></script>
</body>
</html>
